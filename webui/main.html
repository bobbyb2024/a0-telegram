<div class="telegram-dashboard" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 16px;">
    <template x-if="$store.tgMain">
        <div>
            <!-- Header + connection status badge -->
            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border-color, #e0e0e0);">
                <h3 style="margin: 0; color: #0088cc;">Telegram Integration</h3>
                <span
                    :style="'padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; background: ' + $store.tgMain.statusBg + '; color: ' + $store.tgMain.statusColor + ';'"
                    x-text="$store.tgMain.statusText"></span>
            </div>

            <!-- Fatal error advisory (invalid/revoked token, etc.) -->
            <div x-show="$store.tgMain.fatalError"
                 style="background: #fce4ec; border: 1px solid #ef9a9a; border-radius: 6px; padding: 10px; margin-bottom: 14px; font-size: 11px; color: #b71c1c; line-height: 1.5;">
                <strong>&#128308; Bridge Error:</strong>
                <span x-text="$store.tgMain.fatalError"></span>
            </div>

            <!-- Privacy mode advisory (shown when privacy mode is ON) -->
            <div x-show="$store.tgMain.privacyMode"
                 style="background: #fff3e0; border: 1px solid #ffcc80; border-radius: 6px; padding: 10px; margin-bottom: 14px; font-size: 11px; color: #e65100; line-height: 1.5;">
                <strong>&#9888; Privacy Mode ON:</strong>
                <span x-text="$store.tgMain.privacyAdvisory"></span>
            </div>

            <!-- Stats row -->
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 16px;">
                <div style="text-align: center; padding: 10px; background: var(--bg-secondary, #f8f9fa); border-radius: 6px;">
                    <div style="font-size: 20px; font-weight: 700; color: #0088cc;" x-text="$store.tgMain.chatCount"></div>
                    <div style="font-size: 11px; color: var(--text-secondary, #888);">Bridge Chats</div>
                </div>
                <div style="text-align: center; padding: 10px; background: var(--bg-secondary, #f8f9fa); border-radius: 6px;">
                    <div style="font-size: 20px; font-weight: 700; color: #6a1b9a;" x-text="$store.tgMain.topicCount"></div>
                    <div style="font-size: 11px; color: var(--text-secondary, #888);">Topics</div>
                </div>
                <div style="text-align: center; padding: 10px; background: var(--bg-secondary, #f8f9fa); border-radius: 6px;">
                    <div style="font-size: 20px; font-weight: 700; color: #2e7d32;" x-text="$store.tgMain.restartCount"></div>
                    <div style="font-size: 11px; color: var(--text-secondary, #888);">Restarts</div>
                </div>
                <div style="text-align: center; padding: 10px; background: var(--bg-secondary, #f8f9fa); border-radius: 6px;">
                    <div style="font-size: 13px; font-weight: 600; color: #37474f;" x-text="$store.tgMain.webhookMode"></div>
                    <div style="font-size: 11px; color: var(--text-secondary, #888);">Update mode</div>
                </div>
            </div>

            <!-- Test Connection -->
            <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;">
                <button @click="$store.tgMain.test()"
                        style="background: #0088cc; color: #fff; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px;">
                    Test Connection
                </button>
            </div>

            <!-- Chat Bridge Section -->
            <div style="padding-top: 12px; border-top: 1px solid var(--border-color, #e0e0e0);">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                    <h4 style="margin: 0; color: #0088cc;">Chat Bridge</h4>
                    <span
                        :style="'padding: 2px 8px; border-radius: 8px; font-size: 10px; font-weight: 600; background: ' + $store.tgMain.bridgeStatusBg + '; color: ' + $store.tgMain.bridgeStatusColor + ';'"
                        x-text="$store.tgMain.bridgeStatusText"></span>
                </div>
                <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                    <button @click="$store.tgMain.bridge('start')"
                            style="background: #43a047; color: #fff; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px;">
                        Start Bridge
                    </button>
                    <button @click="$store.tgMain.bridge('stop')"
                            style="background: #e53935; color: #fff; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px;">
                        Stop Bridge
                    </button>
                    <button @click="$store.tgMain.bridge('restart')"
                            style="background: #ff9800; color: #fff; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px;">
                        Restart Bridge
                    </button>
                    <button @click="$store.tgMain.bridge('status')"
                            style="background: var(--bg-secondary, #f0f0f0); color: var(--text-primary, #333); border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px;">
                        Refresh Status
                    </button>
                </div>
            </div>

            <!-- Forum Topics Section -->
            <div style="padding-top: 12px; margin-top: 12px; border-top: 1px solid var(--border-color, #e0e0e0);">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                    <h4 style="margin: 0; color: #6a1b9a;">Forum Topics</h4>
                    <button @click="$store.tgMain.loadTopics()"
                            style="background: var(--bg-secondary, #f0f0f0); color: var(--text-primary, #333); border: none; padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 11px;">
                        Load
                    </button>
                </div>
                <div style="font-size: 11px; color: var(--text-secondary, #888);">
                    <span x-show="!$store.tgMain.topicsData && !$store.tgMain.topicsEmpty && !$store.tgMain.topicsError">
                        Click Load to show topic mappings.
                    </span>
                    <span x-show="$store.tgMain.topicsEmpty">
                        No forum topic mappings configured.
                    </span>
                    <span x-show="$store.tgMain.topicsError"
                          x-text="$store.tgMain.topicsError"
                          style="color: #c62828;"></span>
                    <template x-if="$store.tgMain.topicsData">
                        <table style="width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 6px;">
                            <thead>
                                <tr>
                                    <th style="text-align: left; padding: 3px 6px; border-bottom: 1px solid var(--border-color, #e0e0e0); color: var(--text-secondary, #888);">Topic Key</th>
                                    <th style="text-align: left; padding: 3px 6px; border-bottom: 1px solid var(--border-color, #e0e0e0); color: var(--text-secondary, #888);">Name</th>
                                    <th style="text-align: left; padding: 3px 6px; border-bottom: 1px solid var(--border-color, #e0e0e0); color: var(--text-secondary, #888);">Project ID</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="entry in $store.tgMain.topicEntries()" :key="entry[0]">
                                    <tr>
                                        <td x-text="entry[0]" style="padding: 3px 6px; font-family: monospace; color: #37474f;"></td>
                                        <td x-text="entry[1].name || '\u2014'" style="padding: 3px 6px;"></td>
                                        <td x-text="entry[1].project_id || '\u2014'" style="padding: 3px 6px; color: #6a1b9a;"></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </template>
                </div>
            </div>
        </div>
    </template>
</div>

<script type="module">
import { createStore } from '/js/AlpineStore.js';

createStore('tgMain', {
    // Connection status badge
    statusText: 'Checking...',
    statusBg: '#fce4ec',
    statusColor: '#c62828',

    // Privacy advisory
    privacyMode: false,
    privacyAdvisory: '',

    // Stats grid
    chatCount: '-',
    topicCount: '-',
    restartCount: '-',
    webhookMode: '-',

    // Bridge status badge
    bridgeStatusText: 'Unknown',
    bridgeStatusBg: '#f5f5f5',
    bridgeStatusColor: '#888',

    // Fatal error (invalid token, etc.)
    fatalError: '',

    // Forum topics panel
    topicsData: null,
    topicsEmpty: false,
    topicsError: '',

    // ----------------------------------------------------------------
    // Internal helpers
    // ----------------------------------------------------------------
    _api(url, body) {
        return (globalThis.fetchApi || fetch)(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
    },

    _applyBridgeStatus(data) {
        if (data.chat_count !== undefined) this.chatCount = data.chat_count;
        if (data.topic_count !== undefined) this.topicCount = data.topic_count;
        if (data.restart_count !== undefined) this.restartCount = data.restart_count;
        this.webhookMode = data.webhook_mode ? 'Webhook' : 'Polling';

        // Surface fatal errors (e.g. invalid/revoked token) prominently
        this.fatalError = (data.status === 'error' && data.error) ? data.error : '';

        if (data.running && data.status === 'connected') {
            this.bridgeStatusText = 'Connected' + (data.user ? ' as ' + data.user : '');
            this.bridgeStatusBg = '#e8f5e9';
            this.bridgeStatusColor = '#2e7d32';
        } else if (data.running) {
            this.bridgeStatusText = data.status || 'Connecting...';
            this.bridgeStatusBg = '#fff3e0';
            this.bridgeStatusColor = '#e65100';
        } else if (data.status === 'error') {
            this.bridgeStatusText = 'Error';
            this.bridgeStatusBg = '#fce4ec';
            this.bridgeStatusColor = '#b71c1c';
        } else {
            this.bridgeStatusText = data.status || 'Stopped';
            this.bridgeStatusBg = '#f5f5f5';
            this.bridgeStatusColor = '#888';
        }
    },

    // ----------------------------------------------------------------
    // Actions
    // ----------------------------------------------------------------
    async test() {
        this.statusText = 'Testing...';
        this.statusBg = '#fff3e0';
        this.statusColor = '#e65100';
        this.privacyMode = false;
        try {
            const resp = await this._api('/api/plugins/telegram/telegram_test', {});
            const data = await resp.json();
            if (data.ok) {
                this.statusText = 'Connected as ' + data.user;
                this.statusBg = '#e8f5e9';
                this.statusColor = '#2e7d32';
                if (data.privacy_mode && data.privacy_advisory) {
                    this.privacyMode = true;
                    this.privacyAdvisory = data.privacy_advisory;
                }
            } else {
                this.statusText = data.error || 'Error';
                this.statusBg = '#fce4ec';
                this.statusColor = '#c62828';
                toastFrontendError(data.error || 'Connection test failed');
            }
        } catch {
            this.statusText = 'API unavailable';
            this.statusBg = '#fce4ec';
            this.statusColor = '#c62828';
            toastFrontendError('Telegram API unavailable');
        }
    },

    async bridge(action) {
        try {
            const resp = await this._api('/api/plugins/telegram/telegram_bridge_api', { action });
            const data = await resp.json();
            this._applyBridgeStatus(data);
            if (data.ok) {
                if (data.message) toastFrontendSuccess(data.message);
            } else {
                toastFrontendError(data.error || 'Unknown error');
            }
        } catch {
            toastFrontendError('API unavailable');
        }
    },

    async loadTopics() {
        this.topicsData = null;
        this.topicsEmpty = false;
        this.topicsError = '';
        try {
            const resp = await this._api('/api/plugins/telegram/telegram_bridge_api', { action: 'list_topics' });
            const data = await resp.json();
            if (!data.ok) {
                this.topicsError = data.error || 'Failed to load topics.';
            } else if (!data.count) {
                this.topicsEmpty = true;
            } else {
                this.topicsData = data.topics;
            }
        } catch {
            this.topicsError = 'API unavailable.';
        }
    },

    topicEntries() {
        return this.topicsData ? Object.entries(this.topicsData) : [];
    },

    // ----------------------------------------------------------------
    // Lifecycle
    // ----------------------------------------------------------------
    init() {
        setTimeout(() => { this.test(); this.bridge('status'); }, 50);
    },
});
</script>
