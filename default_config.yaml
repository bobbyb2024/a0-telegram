# Telegram Plugin Configuration
# Token can also be set via environment variable:
#   TELEGRAM_BOT_TOKEN

bot:
  token: ""          # BotFather token
  username: ""       # Auto-filled on first connect

defaults:
  message_limit: 50
  parse_mode: "HTML"    # HTML or Markdown

# Allowed chat IDs (empty = allow all)
allowed_chats: []

memory:
  auto_save_summaries: true
  export_format: "markdown"

# Background polling for new messages
polling:
  enabled: false
  interval: 60
  watch_chats: []

# Chat bridge — Telegram as a chat frontend to Agent Zero
chat_bridge:
  auto_start: false
  # Chats are managed via the telegram_chat tool, not config

  # User allowlist: only these Telegram users can interact with the bot.
  # Empty list = allow everyone. Accepts:
  #   - NUMERIC user ID (preferred, stable): 123456789
  #   - @username (fragile — breaks if user changes handle): "@bobbyb"
  # Get the numeric ID by messaging @userinfobot on Telegram.
  allowed_users: []

  # Full agent mode (NEW DEFAULT, v1.3+): treat Telegram as a frontend to
  # Agent Zero — every allowed user gets the full agent loop (tools, file
  # access, project context per topic) with responses visible in the web UI.
  # The chat_list (managed via telegram_chat tool) and allowed_users below
  # are the only security gates. Set to false to fall back to the legacy
  # restricted/elevated two-mode model that requires `!auth <key>`.
  full_agent_mode: true

  # Elevated mode (legacy, only used when full_agent_mode: false):
  # Allows authenticated users to access the full Agent Zero agent loop
  # via `!auth <key>` from Telegram.
  allow_elevated: false
  # Auth key for elevated mode. Auto-generated on first use if left empty.
  # Shown in WebUI settings. Required to authenticate via !auth <key> in Telegram.
  auth_key: ""
  # Session timeout in seconds (default: 5 minutes). Elevated sessions expire
  # after this duration and must be re-authenticated.
  session_timeout: 300

  # Maximum concurrent agent responses across all chats (prevents overload).
  max_concurrent: 3

  # Per-user context isolation: each Telegram user gets their own conversation
  # history even within the same chat. When false, all users share one context.
  per_user_context: false

  # Debug trace: when true, every step of the message-processing pipeline
  # emits a `[DBG]` log line (receive → chat filter → user filter → rate
  # limit → agent call → send → success reaction). Use when diagnosing
  # "my messages don't get processed" issues. This value seeds the runtime
  # flag at bridge startup; it can also be toggled live from the bridge
  # dashboard without touching config. Leave false in production — every
  # message produces ~20 extra log lines.
  debug_mode: false

# Emoji reactions — sent on incoming messages to signal processing state.
# Requires the bot to have the "can_post_messages" right in the chat.
# setMessageReaction silently fails if reactions are disabled in the chat.
reactions:
  enabled: true
  # Sent immediately when a message arrives (pre-processing acknowledgement).
  pre_react: "👍"
  # Sent while the agent is thinking (replaces pre_react).
  processing_react: "🤔"
  # Sent on successful response (replaces processing_react).
  success_react: "✅"
  # Sent when the agent encounters an error.
  failure_react: "❌"

# Streaming — progressively edit the bot's reply as text is generated.
streaming:
  enabled: true
  # Granularity of streamed updates: "word", "sentence", or "paragraph".
  mode: "sentence"
  # Minimum milliseconds between Telegram edit calls (Telegram limit: ~20/min per message).
  edit_interval_ms: 1500

# Supergroup / Forum topic integration.
supergroups:
  # Automatically create an Agent Zero context when a new forum topic is created.
  auto_context_on_new_topic: true
  # Prefix applied to auto-created project IDs for new topics.
  # Final ID: "{prefix}{chat_id}:topic:{thread_id}"
  topic_project_prefix: "tg-"

# Bi-directional sync: Agent Zero project ↔ Telegram topic.
#
# When enabled, the bridge watches Agent Zero's context list and mirrors
# changes into a designated forum-enabled supergroup on Telegram:
#
#   * New A0 context (created in the web UI)  → new forum topic in TG
#   * A0 context archived / removed           → topic is closed or deleted in TG
#
# Pair with supergroups.auto_context_on_new_topic (already true) so the
# reverse direction also works — creating a topic from Telegram makes a
# matching A0 project.
#
# Setup requirements:
#   1. Create (or pick) a supergroup on Telegram and enable "Topics".
#   2. Make the bot an admin with "Manage Topics" permission.
#   3. Set supergroup_id below to the chat ID (looks like "-1001234567890").
#
# Defaults to OFF because enabling it can auto-create many topics the
# first time it runs. Opt in after the supergroup is prepared.
project_sync:
  enabled: false
  # Chat ID of the forum-enabled supergroup where A0 projects become topics.
  # Must be numeric (e.g. "-1001234567890"). Get it by forwarding a message
  # from the group to @userinfobot.
  supergroup_id: ""
  # What to do when an A0 context disappears: "close" (soft — history kept,
  # topic is locked; user can reopen) or "delete" (destructive — topic and
  # its messages are removed permanently).
  archive_action: "close"
  # Seconds between sync passes. Shorter = faster mirroring, more API calls.
  poll_interval: 15
  # On first run, sync existing A0 contexts (create topics for each). If
  # false (default), pre-existing contexts are added to a "baseline" list
  # and ignored — only contexts created AFTER sync is first enabled will
  # get topics. Flip to true only if you deliberately want to back-fill.
  sync_existing: false
  # Optional: ignore contexts whose name starts with any of these prefixes
  # (lets you keep certain A0 chats local without them appearing in TG).
  name_ignore_prefixes: ["_", "tmp-", "scratch"]

# Approval workflow — inline button confirmations for sensitive actions.
approvals:
  # Seconds to wait for a button press before timing out.
  timeout_seconds: 60

# Webhook mode (alternative to getUpdates long-polling).
# When enabled the bridge expects Telegram to POST updates to webhook_url.
# You must run set_webhook via @BotFather or telegram_manage to register it.
webhook:
  enabled: false
  # Public HTTPS URL Telegram will POST to. Must be reachable by Telegram servers.
  url: ""
  # Optional secret token (set in setWebhook, verified in X-Telegram-Bot-Api-Secret-Token header).
  secret_token: ""
  # Local port the webhook listener binds to (reverse-proxied by nginx/traefik in prod).
  port: 8443
  # Path suffix for the webhook endpoint (appended to webhook url).
  path: "/api/plugins/telegram/webhook"

# Bridge watchdog — auto-restarts the bridge if it crashes or goes silent.
watchdog:
  enabled: true
  # Seconds of silence (no processed messages) before declaring the bridge stale.
  stale_seconds: 300
  # Maximum automatic restarts before giving up (resets after 1 hour clean run).
  max_restarts: 5

# Security — prompt injection defense
security:
  max_message_length: 4096
  sanitize_content: true
  strip_injection_patterns: true
